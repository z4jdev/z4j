name: Release

# Manual-publish phase: this workflow builds the package and attaches
# the wheel + sdist to a GitHub Release. It does NOT upload to PyPI.
# PyPI uploads are hand-picked from a local staging folder via twine,
# under the maintainer's direct control. See docs/RELEASE.md.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: read

env:
  UV_VERSION: "0.5.11"

jobs:
  build-and-release:
    name: Build and attach to GitHub Release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match pyproject version $PKG_VERSION"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Run unit tests
        # Post-1.4.0: tests live under backend/tests/ (the brain
        # code that absorbed the z4j-brain dist). Integration tests
        # need Postgres -- run unit suite only here. Comprehensive
        # testing happens locally before tag-push per
        # RELEASE-DISCIPLINE.md.
        run: uv run pytest -xvs backend/tests/unit/

      - name: Build wheel + sdist
        run: uv build

      - name: Validate metadata
        run: |
          uv tool install twine
          uv tool run twine check dist/*

      - name: Create GitHub Release with artefacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
