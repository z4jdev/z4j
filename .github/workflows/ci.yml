name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.5.11"
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Run unit tests
        # Integration tests live in tests/integration/ and run in
        # their own job (needs Postgres service container). Scoping
        # this job to tests/unit/ avoids attempting them twice
        # (they'd skip here without Postgres, which is wasteful).
        run: uv run pytest -xvs tests/unit/

  integration:
    name: Integration tests (Postgres 18)
    runs-on: ubuntu-24.04
    needs: [lint]
    services:
      postgres:
        image: postgres:18-trixie
        env:
          POSTGRES_USER: z4j
          POSTGRES_PASSWORD: z4j
          POSTGRES_DB: z4j
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before pytest
        # tries to CREATE DATABASE. The conftest fixture connects via
        # asyncpg to the admin DB, so a slow-start Postgres would
        # surface as a confusing fixture-level connection error.
        options: >-
          --health-cmd="pg_isready -U z4j"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      # The integration conftest reads Z4J_TEST_POSTGRES_URL and uses
      # the shared-Postgres path (one container per session, per-test
      # CREATE DATABASE for isolation). This is much faster than the
      # testcontainers fallback - testcontainers would still try to
      # spin its own Postgres on every test session.
      Z4J_TEST_POSTGRES_URL: "postgresql://z4j:z4j@localhost:5432/z4j"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync dependencies (with test-integration extras)
        run: uv sync --all-extras --dev

      - name: Run integration tests
        # The migration round-trip test (TestMigrationRoundTrip) is
        # the load-bearing check for the 1.4.x bidirectional schema
        # promise. If this job is failing the public docs claim about
        # bidirectional upgrade/downgrade is no longer true; do not
        # tag a release until it is green again.
        run: uv run pytest -xvs tests/integration/

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-24.04
    needs: [test, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Build
        run: uv build

      - name: Validate metadata
        run: |
          uv tool install twine
          uv tool run twine check dist/*

      # ---------------------------------------------------------------
      # Wheel-content assertion. twine check validates METADATA only;
      # it cannot detect that the wheel is missing the bundled
      # dashboard. We unzip the built wheel and assert the SPA
      # index.html plus a minimum number of asset files actually
      # ship inside. If a future change to packaging or the build
      # toolchain accidentally strips dashboard/dist/, this step
      # fails the build BEFORE the artefact is uploaded.
      #
      # The wheel name is z4j-VERSION-py3-none-any.whl (the project
      # name is "z4j" since the 1.4.0 consolidation). The brain code
      # ships under the z4j_brain/ namespace inside the wheel, which
      # is where the dashboard bundle also lives.
      # ---------------------------------------------------------------
      - name: Verify dashboard SPA bundled in wheel
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/z4j-*.whl | head -1)
          echo "Inspecting wheel: ${WHEEL}"
          ASSET_COUNT=$(unzip -l "${WHEEL}" | grep -c 'z4j_brain/dashboard/dist/' || true)
          HAS_INDEX=$(unzip -l "${WHEEL}" | grep -c 'z4j_brain/dashboard/dist/index.html' || true)
          echo "  dashboard/dist/ entries: ${ASSET_COUNT}"
          echo "  dashboard/dist/index.html: ${HAS_INDEX}"
          if [ "${HAS_INDEX}" -lt 1 ] || [ "${ASSET_COUNT}" -lt 100 ]; then
            echo ""
            echo "::error::z4j wheel is MISSING the bundled dashboard SPA."
            echo "  Expected: index.html + 100+ asset files under z4j_brain/dashboard/dist/"
            echo "  Got:      ${HAS_INDEX} index.html, ${ASSET_COUNT} total entries."
            echo ""
            echo "  Likely cause: the dashboard build step did not run, or a"
            echo "  recursive directory exclusion stripped dashboard/dist/ before"
            echo "  build."
            exit 1
          fi

      # ---------------------------------------------------------------
      # End-to-end install + boot smoke. Even with the wheel-content
      # check above, we want to PROVE the wheel actually serves the
      # dashboard once installed. Spin up the brain in a fresh venv
      # on a random port, curl GET /, assert 200 + text/html. Catches
      # any failure mode where the file is in the wheel but the boot
      # path doesn't find it (path resolution bug, lifecycle bug,
      # missing runtime dep, etc.).
      #
      # Console-script name is `z4j` (single entry point since the
      # 1.4.0 consolidation; the pre-1.4 `z4j-brain` alias was dropped).
      # The brain still exposes its version via `z4j_brain.__version__`
      # for backwards compatibility with code that imports it.
      # ---------------------------------------------------------------
      - name: Install + boot smoke (GET / must return 200 HTML)
        run: |
          set -euo pipefail
          WHEEL=$(ls dist/z4j-*.whl | head -1)
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --quiet "${WHEEL}"
          INSTALLED_VERSION=$(/tmp/smoke-venv/bin/python -c \
            "from z4j_brain import __version__; print(__version__)")
          echo "Installed z4j ${INSTALLED_VERSION}"
          # Random port to avoid collisions in shared CI runners.
          PORT=$(/tmp/smoke-venv/bin/python -c \
            "import socket; s=socket.socket(); s.bind(('127.0.0.1',0)); print(s.getsockname()[1]); s.close()")
          export Z4J_SECRET="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          export Z4J_SESSION_SECRET="$(python -c 'import secrets; print(secrets.token_urlsafe(48))')"
          export Z4J_DATABASE_URL="sqlite+aiosqlite:////tmp/smoke.db"
          export Z4J_ENVIRONMENT="dev"
          export Z4J_BIND_HOST="127.0.0.1"
          export Z4J_BIND_PORT="${PORT}"
          export Z4J_LOG_JSON="false"
          /tmp/smoke-venv/bin/z4j serve > /tmp/smoke.log 2>&1 &
          BRAIN_PID=$!
          # Wait up to 30s for boot.
          for i in $(seq 1 30); do
            if curl -sf -o /dev/null "http://127.0.0.1:${PORT}/"; then
              break
            fi
            sleep 1
          done
          # GET / must serve the dashboard SPA (200 text/html).
          STATUS=$(curl -s -o /tmp/smoke.body -w "%{http_code} %{content_type}" \
            "http://127.0.0.1:${PORT}/" || echo "curl-failed")
          echo "GET / -> ${STATUS}"
          # Also assert the SPA hardening: backend prefix returns 404
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://127.0.0.1:${PORT}/api/v1/typo")
          echo "GET /api/v1/typo -> ${API_STATUS}"
          # /metrics must be fail-secure (401 without bearer).
          METRICS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://127.0.0.1:${PORT}/metrics")
          echo "GET /metrics -> ${METRICS_STATUS}"
          # Tear down the brain so the runner doesn't hang.
          kill "${BRAIN_PID}" 2>/dev/null || true
          wait "${BRAIN_PID}" 2>/dev/null || true
          # Assertions
          if ! echo "${STATUS}" | grep -q "^200 text/html"; then
            echo "::error::GET / did not return 200 text/html (got ${STATUS})."
            echo "::error::Brain boot log:"
            tail -50 /tmp/smoke.log >&2
            exit 1
          fi
          if [ "${API_STATUS}" != "404" ]; then
            echo "::error::SPA hardening regressed: /api/v1/typo returned ${API_STATUS} (expected 404)."
            exit 1
          fi
          if [ "${METRICS_STATUS}" != "401" ]; then
            echo "::error::/metrics fail-secure regressed: returned ${METRICS_STATUS} (expected 401)."
            exit 1
          fi
          echo "Smoke OK: dashboard serves, SPA hardening + /metrics fail-secure both intact."

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
